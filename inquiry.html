<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문의하기</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<section class="contact-form">

    <h2>문의하기</h2>

    <form>

        <label>이름</label>
        <input type="text" placeholder="이름을 입력하세요">

        <label>이메일</label>
        <input type="email" placeholder="이메일을 입력하세요">

        <label>문의 유형</label>

        <select>
            <option>상품 문의</option>
            <option>배송 문의</option>
            <option>교환 및 환불</option>
            <option>기타 문의</option>
        </select>

        <label>문의 내용</label>

        <textarea rows="6"
        placeholder="문의 내용을 입력해주세요"></textarea>

        <input type="submit" value="문의하기">

    </form>

    <br>

    <a href="index.html" class="buy-btn">
        메인으로 돌아가기
    </a>

</section>

</body>
</html>
