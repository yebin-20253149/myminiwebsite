<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>구매하기</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<section>

<h2>Purchase</h2>

<form class="contact-form">

<label>구매자 이름</label>
<input type="text" placeholder="이름을 입력하세요">

<label>연락처</label>
<input type="text" placeholder="010-0000-0000">

<label>배송지</label>
<input type="text" placeholder="배송받을 주소를 입력하세요">

<label>구매 상품</label>

<select>
<option>Sunny Mood</option>
<option>Rainy Mood</option>
<option>Thunder Mood</option>
<option>Rainbow Mood</option>
<option>Cloudy Mood</option>
<option>Snowy Mood</option>
</select>

<label>수량</label>

<select>
<option>1개</option>
<option>2개</option>
<option>3개</option>
<option>4개</option>
<option>5개 이상</option>
</select>

<label>배송 요청사항</label>

<textarea rows="5"
placeholder="예) 부재 시 문 앞에 놓아주세요">
</textarea>

<input type="submit" value="구매하기">

</form>

</section>

</body>
</html>
